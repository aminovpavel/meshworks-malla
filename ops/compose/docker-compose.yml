version: '3.8'

services:
  malla-web:
    # Use pre-built image by default, override with 'build: .' for development
    image: ${MALLA_IMAGE:-ghcr.io/zenitram/malla:latest}
    # Uncomment the following line for local development:
    # build: .

    # Choose between Flask dev server and Gunicorn
    # Default: Flask development server (malla-web)
    # Production: Gunicorn WSGI server (malla-web-gunicorn)
    command: ${MALLA_WEB_COMMAND:-/app/.venv/bin/malla-web}

    ports:
      - "${MALLA_WEB_PORT:-5008}:5008"
    environment:
      - MALLA_HOST=0.0.0.0
      - MALLA_PORT=5008
      - MALLA_DATABASE_FILE=/app/data/meshtastic_history.db
      - MALLA_NAME=${MALLA_NAME:-Malla}
      - MALLA_SECRET_KEY=${MALLA_SECRET_KEY:-dev-secret-key-change-in-production}
      - MALLA_DEBUG=${MALLA_DEBUG:-false}
      - MALLA_STATIC_VERSION=${MALLA_STATIC_VERSION:-dev}
    volumes:
      - malla_data:/app/data
      # Optional: mount your own config file (uncomment if you have one)
      # - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    depends_on:
      - meshpipe

  meshpipe:
    image: ${MESHPIPE_IMAGE:-ghcr.io/aminovpavel/meshpipe-go:latest}
    container_name: ${MESHPIPE_CONTAINER_NAME:-meshpipe}
    restart: unless-stopped
    environment:
      - MESHPIPE_DATABASE_FILE=${MESHPIPE_DATABASE_FILE:-/data/meshtastic_history.db}
      - MESHPIPE_MQTT_BROKER_ADDRESS=${MESHPIPE_MQTT_BROKER_ADDRESS}
      - MESHPIPE_MQTT_PORT=${MESHPIPE_MQTT_PORT:-1883}
      - MESHPIPE_MQTT_USERNAME=${MESHPIPE_MQTT_USERNAME:-}
      - MESHPIPE_MQTT_PASSWORD=${MESHPIPE_MQTT_PASSWORD:-}
      - MESHPIPE_MQTT_TOPIC_PREFIX=${MESHPIPE_MQTT_TOPIC_PREFIX:-msh}
      - MESHPIPE_MQTT_TOPIC_SUFFIX=${MESHPIPE_MQTT_TOPIC_SUFFIX:-/+/+/+/#}
      - MESHPIPE_DEFAULT_CHANNEL_KEY=${MESHPIPE_DEFAULT_CHANNEL_KEY:-}
      - MESHPIPE_CAPTURE_STORE_RAW=${MESHPIPE_CAPTURE_STORE_RAW:-true}
      - MESHPIPE_OBSERVABILITY_ADDRESS=${MESHPIPE_OBSERVABILITY_ADDRESS:-:2112}
    command: ["meshpipe"]
    volumes:
      - malla_data:/data
      # Optional: mount your own config (uncomment if you have one)
      # - ./meshpipe.yaml:/config/config.yaml:ro
    ports:
      - "${MESHPIPE_METRICS_PORT:-2112}:2112"

volumes:
  malla_data:
