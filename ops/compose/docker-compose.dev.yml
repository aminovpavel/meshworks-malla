services:
  meshpipe-dev:
    image: ${MESHPIPE_IMAGE:-ghcr.io/aminovpavel/meshpipe-go:latest}
    container_name: meshpipe-dev
    restart: unless-stopped
    depends_on:
      meshpipe-redis:
        condition: service_started
    environment:
      - MESHPIPE_NAME=${MESHPIPE_NAME:-Meshpipe (Dev)}
      - MESHPIPE_DATABASE_FILE=/data/meshtastic_history.db
      - MESHPIPE_MQTT_BROKER_ADDRESS=${MESHPIPE_MQTT_BROKER_ADDRESS:-meshtastic.taubetele.com}
      - MESHPIPE_MQTT_PORT=${MESHPIPE_MQTT_PORT:-1883}
      - MESHPIPE_MQTT_USERNAME=${MESHPIPE_MQTT_USERNAME:-meshdev}
      - MESHPIPE_MQTT_PASSWORD=${MESHPIPE_MQTT_PASSWORD:-large4cats}
      - MESHPIPE_MQTT_TOPIC_PREFIX=${MESHPIPE_MQTT_TOPIC_PREFIX:-msh/msk}
      - MESHPIPE_MQTT_TOPIC_SUFFIX=${MESHPIPE_MQTT_TOPIC_SUFFIX:-/+/+/+/#}
      - MESHPIPE_CAPTURE_STORE_RAW=${MESHPIPE_CAPTURE_STORE_RAW:-true}
      - MESHPIPE_OBSERVABILITY_ADDRESS=${MESHPIPE_OBSERVABILITY_ADDRESS:-:2112}
      - MESHPIPE_GRPC_ENABLED=${MESHPIPE_GRPC_ENABLED:-true}
      - MESHPIPE_GRPC_LISTEN_ADDRESS=${MESHPIPE_GRPC_LISTEN_ADDRESS:-:7443}
      - MESHPIPE_GRPC_MAX_PAGE_SIZE=${MESHPIPE_GRPC_MAX_PAGE_SIZE:-500}
      - MESHPIPE_GRPC_CACHE_ENABLED=${MESHPIPE_GRPC_CACHE_ENABLED:-true}
      - MESHPIPE_GRPC_CACHE_TTL_SECONDS=${MESHPIPE_GRPC_CACHE_TTL_SECONDS:-30}
      - MESHPIPE_GRPC_CACHE_KEY_PREFIX=${MESHPIPE_GRPC_CACHE_KEY_PREFIX:-meshpipe:grpc:dev}
      - MESHPIPE_REDIS_ADDRESS=${MESHPIPE_REDIS_ADDRESS:-meshpipe-redis:6379}
      - TZ=Europe/Moscow
    command: ["meshpipe"]
    volumes:
      - ../../devdata:/data
    ports:
      - "2112:2112"
      - "7443:7443"

  meshpipe-redis:
    image: redis:7.4-alpine
    container_name: meshpipe-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    volumes:
      - meshpipe_redis_data:/data
    ports:
      - "6379:6379"

  meshpipe-envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: meshpipe-envoy
    restart: unless-stopped
    depends_on:
      meshpipe-dev:
        condition: service_started
    volumes:
      - ../envoy/meshpipe-grpc.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "7444:8080"
      - "9901:9901"

  malla-web:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: meshworks/malla-dev:local
    container_name: malla-web-dev
    restart: unless-stopped
    depends_on:
      meshpipe-envoy:
        condition: service_started
    environment:
      - MALLA_NAME=Malla (Dev)
      - MALLA_HOST=0.0.0.0
      - MALLA_PORT=5008
      - MALLA_DATABASE_FILE=/data/meshtastic_history.db
      - MALLA_TRUST_PROXY_HEADERS=1
      - MALLA_STATIC_VERSION=${MALLA_STATIC_VERSION:-dev}
      - MALLA_ENABLE_BROWSER_DEBUG=1
      - MALLA_DEBUG_TOKEN=${MALLA_DEBUG_TOKEN:-devtoken123}
      - MALLA_DATABASE_READ_ONLY=1
      - VITE_GRPC_WEB_ENDPOINT=${VITE_GRPC_WEB_ENDPOINT:-http://meshpipe-envoy:8080}
      - TZ=Europe/Moscow
    command: ["/app/.venv/bin/malla-web"]
    ports:
      - "5008:5008"
    volumes:
      - ../../devdata:/data:rw

volumes:
  meshpipe_redis_data:
